<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemasonry Heritage | Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root{--gold:#d4af37;--gold-dark:#b8941f;--dark:#07111f;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--dark);color:white;min-height:100vh;}

/* BACKGROUND */
body::before{
content:"";
position:fixed;top:0;left:0;width:100%;height:100%;
background:linear-gradient(rgba(7,17,31,.88), rgba(7,17,31,.95)),url("1517026394531.jpeg");
background-size:cover;background-position:center;background-attachment:fixed;z-index:-2;
}
body::after{content:"◬";position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:400px;color:rgba(212,175,55,.03);z-index:-1;pointer-events:none;}

header{position:fixed;top:0;left:0;width:100%;padding:18px 5%;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);display:flex;justify-content:space-between;align-items:center;z-index:1000;border-bottom:1px solid rgba(212,175,55,.2);}
.logo{font-size:24px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.logout{background:var(--gold);color:#111;padding:8px 20px;border-radius:30px;text-decoration:none;font-weight:600;transition:.3s;border:none;cursor:pointer;font-size:14px;}
.logout:hover{background:var(--gold-dark);transform:translateY(-2px);}

.container{padding:120px 5% 50px;max-width:1400px;margin:auto;}
.page-header{text-align:center;margin-bottom:30px;}
.page-header.fraternity-name{font-size:14px;color:#ccc;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.page-header h1{font-size:36px;color:var(--gold);font-family:'Playfair Display',serif;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:30px;}
.stat-card{background:linear-gradient(145deg,rgba(20,34,56,.9),rgba(11,23,40,.9));backdrop-filter:blur(20px);padding:20px;border-radius:16px;text-align:center;border:1px solid rgba(212,175,55,.25);}
.stat-card h2{color:var(--gold);font-size:32px;font-family:'Playfair Display',serif;}
.stat-card p{color:#ccc;font-size:13px;margin-top:5px;}

/* TABLE WRAPPER */
.table-wrapper{background:linear-gradient(145deg,rgba(20,34,56,.9),rgba(11,23,40,.9));backdrop-filter:blur(20px);border-radius:20px;padding:25px;border:1px solid rgba(212,175,55,.25);}
.table-title{color:var(--gold);margin-bottom:20px;font-family:'Playfair Display',serif;font-size:22px;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:750px;}
thead th{color:var(--gold);text-align:left;padding:14px 10px;border-bottom:2px solid rgba(212,175,55,.3);font-weight:600;font-size:14px;white-space:nowrap;}
tbody td{padding:14px 10px;border-bottom:1px solid rgba(212,175,55,.1);color:#ddd;font-size:14px;}
tbody tr:hover{background:rgba(212,175,55,.05);}

/* STATUS BADGE */
.badge{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize;white-space:nowrap;}
.badge.approved{background:rgba(34,197,94,.2);color:var(--success);border:1px solid var(--success);}
.badge.pending{background:rgba(245,158,11,.2);color:var(--warning);border:1px solid var(--warning);}
.badge.rejected{background:rgba(239,68,68,.2);color:var(--danger);border:1px solid var(--danger);}

/* ACTION DROPDOWN */
.dropdown{position:relative;display:inline-block;}
.dropbtn{background:rgba(212,175,55,.15);color:var(--gold);padding:8px 16px;border-radius:20px;border:1px solid var(--gold);font-weight:600;cursor:pointer;font-size:12px;transition:.3s;}
.dropbtn:hover{background:var(--gold);color:#111;}
.dropdown-content{display:none;position:absolute;right:0;background:#142238;min-width:140px;box-shadow:0 8px 20px rgba(0,0,0,.5);z-index:1;border-radius:12px;border:1px solid rgba(212,175,55,.3);overflow:hidden;}
.dropdown-content button{color:#ddd;padding:10px 14px;text-decoration:none;display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;font-size:13px;transition:.2s;}
.dropdown-content button:hover{background:rgba(212,175,55,.1);}
.dropdown-content button.approve:hover{background:rgba(34,197,94,.2);color:var(--success);}
.dropdown-content button.pending:hover{background:rgba(245,158,11,.2);color:var(--warning);}
.dropdown-content button.reject:hover{background:rgba(239,68,68,.2);color:var(--danger);}
.show{display:block;}

.loading{text-align:center;padding:40px;color:#aaa;}

@media(max-width:900px){
.container{padding:110px 4% 40px;}
.page-header h1{font-size:28px;}
.logo{font-size:20px;}
.table-wrapper{padding:15px;}
  thead th, tbody td{font-size:13px;padding:12px 8px;}
}
</style>
</head>
<body>

<header>
<div class="logo">Freemasonry Heritage</div>
<button class="logout" id="logoutBtn">Logout</button>
</header>

<main class="container">
<div class="page-header">
<div class="fraternity-name">Freemasonry Heritage Fraternity</div>
<h1>Admin Control Panel</h1>
</div>

<!-- STATS -->
<div class="stats">
<div class="stat-card"><h2 id="totalUsers">0</h2><p>Total Members</p></div>
<div class="stat-card"><h2 id="approvedUsers">0</h2><p>Approved</p></div>
<div class="stat-card"><h2 id="pendingUsers">0</h2><p>Pending</p></div>
<div class="stat-card"><h2 id="rejectedUsers">0</h2><p>Rejected</p></div>
</div>

<!-- USERS TABLE -->
<div class="table-wrapper">
<h2 class="table-title">Member Applications</h2>
<div class="table-scroll">
<table>
<thead>
<tr>
<th>#</th>
<th>Full Name</th>
<th>Email</th>
<th>Phone</th>
<th>Applied On</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="usersTable">
<tr><td colspan="7" class="loading">Loading members...</td></tr>
</tbody>
</table>
</div>
</div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// INJECTED FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBSs3ekiR8vQ_1Ar5oZVBKGjuOQbwcgNEM",
  authDomain: "mansonry-family-fraternity.firebaseapp.com",
  databaseURL: "https://mansonry-family-fraternity-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mansonry-family-fraternity",
  storageBucket: "mansonry-family-fraternity.firebasestorage.app",
  messagingSenderId: "964415179161",
  appId: "1:964415179161:web:c8fd1a777542932d7c6b08",
  measurementId: "G-Q8LC74ZFXN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

const usersTable = document.getElementById('usersTable');

// PROTECT ADMIN PAGE - ONLY ADMIN CAN ACCESS
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "https://mansoryfamily.github.io/MANSONRY-FAMILY-FRATERNITY-/login.html";
    return;
  }
  // Check if user is admin
  const userRef = ref(database, "users/" + user.uid);
  onValue(userRef, (snap) => {
    if(snap.exists() && snap.val().role === "admin"){
      loadUsers(); // Load table
    } else {
      alert("Access Denied: Admins Only");
      window.location.href = "dashboard.html";
    }
  }, {onlyOnce: true});
});

// LOAD USERS IN REAL TIME
function loadUsers(){
  const usersRef = ref(database, "users");
  onValue(usersRef, (snapshot) => {
    const data = snapshot.val();
    if(!data){
      usersTable.innerHTML = `<tr><td colspan="7" class="loading">No members found</td></tr>`;
      updateStats(0,0,0,0);
      return;
    }

    let html = "";
    let total = 0, approved = 0, pending = 0, rejected = 0;
    let count = 1;

    Object.keys(data).forEach(uid => {
      const user = data[uid];
      const status = user.status || "pending";
      if(status === "approved") approved++;
      else if(status === "rejected") rejected++;
      else pending++;
      total++;

      const appliedDate = user.timestamp? new Date(user.timestamp).toLocaleDateString() : 'N/A';

      html += `
      <tr>
        <td>${count++}</td>
        <td>${user.fullName || 'N/A'}</td>
        <td>${user.email || 'N/A'}</td>
        <td>${user.phone || 'N/A'}</td>
        <td>${appliedDate}</td>
        <td><span class="badge ${status}">${status}</span></td>
        <td>
          <div class="dropdown">
            <button onclick="toggleDropdown('dropdown${uid}')" class="dropbtn">Actions ▼</button>
            <div id="dropdown${uid}" class="dropdown-content">
              <button class="approve" onclick="updateStatus('${uid}','approved')">Approve</button>
              <button class="pending" onclick="updateStatus('${uid}','pending')">Pending</button>
              <button class="reject" onclick="updateStatus('${uid}','rejected')">Rejected</button>
            </div>
          </div>
        </td>
      </tr>
      `;
    });

    usersTable.innerHTML = html;
    updateStats(total, approved, pending, rejected);
  });
}

function updateStats(total, approved, pending, rejected){
  document.getElementById('totalUsers').textContent = total;
  document.getElementById('approvedUsers').textContent = approved;
  document.getElementById('pendingUsers').textContent = pending;
  document.getElementById('rejectedUsers').textContent = rejected;
}

// TOGGLE DROPDOWN
window.toggleDropdown = function(id) {
  document.getElementById(id).classList.toggle("show");
}

// Close dropdown if click outside
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}

// UPDATE USER STATUS - REAL TIME
window.updateStatus = function(uid, status){
  const userRef = ref(database, "users/" + uid);
  update(userRef, { status: status }).then(() => {
    // also update application status
    const appRef = ref(database, "applications/" + uid);
    update(appRef, { status: status });
    document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
  }).catch((error) => {
    alert("Error: " + error.message);
  });
}

// LOGOUT
document.getElementById("logoutBtn").addEventListener("click",()=>{
  signOut(auth).then(()=>{
    window.location.href="https://mansoryfamily.github.io/MANSONRY-FAMILY-FRATERNITY-/login.html";
  });
});
</script>

</body>
</html>
