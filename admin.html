<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Announcements</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#050c18;color:#fff;padding:40px;}
h2{color:#d4af37;font-family:'Cinzel',serif;}
.input-box{background:rgba(15,26,46,.7);padding:25px;border-radius:16px;border:1px solid rgba(212,175,55,.3);margin-bottom:30px;}
input,textarea{width:100%;padding:12px;margin:10px 0;background:rgba(5,12,24,.6);border:1px solid rgba(212,175,55,.3);border-radius:8px;color:#fff;font-family:'Poppins';}
button{background:linear-gradient(135deg,#d4af37,#b8941f);color:#111;padding:12px 25px;border:none;border-radius:8px;font-weight:600;cursor:pointer;}
button:hover{transform:translateY(-2px);}
.ann-list{margin-top:20px;}
.ann-item{background:rgba(15,26,46,.7);padding:18px;border-radius:12px;margin-bottom:12px;border-left:4px solid #d4af37;display:flex;justify-content:space-between;align-items:flex-start;}
.ann-item h4{color:#d4af37;margin:0 0 6px 0;}
.ann-item p{color:#ddd;font-size:14px;margin:0;}
.ann-item small{color:#8a9bb0;font-size:11px;}
.delete-btn{background:#ff3b3b;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
.delete-btn:hover{background:#ff1f1f;}
</style>
</head>
<body>

<h2>📢 Manage Announcements</h2>

<div class="input-box">
  <h3>Post New Announcement</h3>
  <input type="text" id="annTitle" placeholder="Announcement Title">
  <textarea id="annMessage" placeholder="Announcement Message" rows="4"></textarea>
  <button id="postAnnBtn">Post Announcement</button>
</div>

<div class="ann-list">
  <h3>All Announcements</h3>
  <div id="adminAnnList">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBSs3ekiR8vQ_1Ar5oZVBKGjuOQbwcgNEM",
authDomain: "mansonry-family-fraternity.firebaseapp.com",
databaseURL: "https://mansonry-family-fraternity-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "mansonry-family-fraternity",
storageBucket: "mansonry-family-fraternity.firebasestorage.app",
messagingSenderId: "964415179161",
appId: "1:964415179161:web:c8fd1a777542932d7c6b08"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// POST NEW ANNOUNCEMENT
document.getElementById("postAnnBtn").addEventListener("click", () => {
  const title = document.getElementById("annTitle").value.trim();
  const message = document.getElementById("annMessage").value.trim();

  if(!title ||!message){
    alert("Please fill both title and message");
    return;
  }

  const annRef = ref(db, "announcements");
  push(annRef, {
    title: title,
    message: message,
    timestamp: Date.now()
  }).then(() => {
    alert("Announcement Posted!");
    document.getElementById("annTitle").value = "";
    document.getElementById("annMessage").value = "";
  });
});

// LOAD ALL ANNOUNCEMENTS WITH DELETE BUTTON
const annRef = ref(db, "announcements");
onValue(annRef, (snapshot) => {
  const list = document.getElementById("adminAnnList");
  const data = snapshot.val();

  if(!data){
    list.innerHTML = "<p style='color:#8a9bb0'>No announcements yet</p>";
    return;
  }

  let html = "";
  Object.keys(data).reverse().forEach(key => {
    const a = data[key];
    const date = a.timestamp? new Date(a.timestamp).toLocaleString() : 'Just now';
    html += `
      <div class="ann-item">
        <div>
          <h4>${a.title}</h4>
          <p>${a.message}</p>
          <small>${date}</small>
        </div>
        <button class="delete-btn" onclick="deleteAnn('${key}')">🗑️ Delete</button>
      </div>
    `;
  });
  list.innerHTML = html;
});

// DELETE ANNOUNCEMENT
window.deleteAnn = function(key){
  if(confirm("Are you sure you want to delete this announcement?")){
    remove(ref(db, "announcements/" + key)).then(() => {
      alert("Announcement Deleted");
    });
  }
}
</script>
</body>
</html>
