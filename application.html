<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemasonry Heritage | Membership Application</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37;--gold-dark:#b8941f;--dark:#07111f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--dark);color:white;min-height:100vh;padding-bottom:120px;}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(7,17,31,.88), rgba(7,17,31,.95)),url("1517026394531.jpeg");background-size:cover;background-position:center;background-attachment:fixed;z-index:-2;}
header{position:fixed;top:0;left:0;width:100%;padding:20px 8%;background:rgba(0,0,0,.8);backdrop-filter:blur(15px);display:flex;justify-content:space-between;align-items:center;z-index:1000;border-bottom:1px solid rgba(212,175,55,.2);}
.logo{font-size:28px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.logout{background:var(--gold);color:#111;padding:10px 25px;border-radius:30px;text-decoration:none;font-weight:600;}
.container{padding:140px 8% 50px;max-width:1000px;margin:auto;}
.fraternity-header{text-align:center;margin-bottom:50px;}
.fraternity-header h1{font-size:48px;color:var(--gold);font-family:'Playfair Display',serif;}
.form-card{background:linear-gradient(145deg,rgba(20,34,56,.9),rgba(11,23,40,.9));backdrop-filter:blur(20px);border-radius:25px;padding:45px;border:1px solid rgba(212,175,55,.25);}
.form-card.submitted{border-color:#4cff88;background:linear-gradient(145deg,rgba(20,80,60,.9),rgba(10,60,40,.9));}
.section{margin-bottom:45px;padding-bottom:35px;border-bottom:1px solid rgba(212,175,55,.15);}
.section-title{font-size:24px;color:var(--gold);margin-bottom:25px;display:flex;align-items:center;gap:12px;}
.section-title span{background:var(--gold);color:#111;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.form-group{display:flex;flex-direction:column;}
.form-group label{color:#ccc;font-size:14px;margin-bottom:8px;}
.form-group input,.form-group select{width:100%;background:#08111f;border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:14px 18px;color:white;font-size:15px;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--gold);}

/* PHONE WITH COUNTRY CODE - SAME SIZE */
.phone-wrapper{display:flex;gap:10px;}
.phone-wrapper .form-group{flex:1;}
.phone-wrapper select{width:100%;}

.btn-submit{width:100%;padding:18px;border:none;border-radius:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111;font-size:18px;font-weight:700;cursor:pointer;margin-top:30px;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(20,34,56,.98);padding:30px 40px;border-radius:18px;border:2px solid var(--gold);z-index:9999;opacity:0;transition:.4s;text-align:center;min-width:320px;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast.success{border-color:#4cff88;} .toast.error{border-color:#ff5555;}
</style>
</head>

<body>
<div id="toast" class="toast"><span class="icon" id="toastIcon"></span><span class="message" id="toastMessage"></span></div>

<header><div class="logo">Freemasonry Heritage</div><a href="#" class="logout">Logout</a></header>

<main class="container">
<div class="fraternity-header"><h1>Membership Application Form</h1></div>

<form class="form-card" id="applicationForm">
<div class="section">
<h2 class="section-title"><span>1</span>Personal Details</h2>
<div class="form-grid">
<div class="form-group"><label>Full Name *</label><input type="text" id="fullName" required></div>
<div class="form-group"><label>Date of Birth *</label><input type="date" id="dob" required></div>
<div class="form-group"><label>ID Number *</label><input type="text" id="idNumber" required></div>
<div class="form-group"><label>Gender *</label><select id="gender" required><option value="">Select</option><option>Male</option><option>Female</option></select></div>
<div class="form-group"><label>Birth Town *</label><input type="text" id="birthTown" required></div>
<div class="form-group"><label>Nickname</label><input type="text" id="nickname"></div>

<!-- COUNTRY FIRST -->
<div class="form-group">
<label>Country *</label>
<select id="country" required>
<option value="">Select Country</option>
<option value="Kenya">🇰🇪 Kenya</option>
<option value="Uganda">🇺🇬 Uganda</option>
<option value="Tanzania">🇹🇿 Tanzania</option>
<option value="Rwanda">🇷🇼 Rwanda</option>
<option value="DRC">🇨🇩 DRC</option>
<option value="South Africa">🇿🇦 South Africa</option>
<option value="Nigeria">🇳🇬 Nigeria</option>
<option value="Ghana">🇬🇭 Ghana</option>
<option value="USA">🇺🇸 USA</option>
<option value="UK">🇬🇧 UK</option>
<option value="Other">Other</option>
</select>
</div>

<!-- PHONE NUMBER SECOND - SAME SIZE CARD -->
<div class="form-group">
<label>Phone Number *</label>
<div class="phone-wrapper">
<select id="countryCode" required>
<option value="">Code</option>
<option value="+254">+254</option>
<option value="+256">+256</option>
<option value="+255">+255</option>
<option value="+250">+250</option>
<option value="+243">+243</option>
<option value="+27">+27</option>
<option value="+234">+234</option>
<option value="+233">+233</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
</select>
<input type="tel" id="phone" placeholder="712345678" required pattern="[0-9]{7,15}">
</div>
</div>

</div>
</div>

<div class="section">
<h2 class="section-title"><span>2</span>Business Information</h2>
<div class="form-grid">
<div class="form-group"><label>Type of Business *</label><input type="text" id="businessType" required></div>
<div class="form-group"><label>Business Location *</label><input type="text" id="businessLocation" required></div>
</div>
</div>

<div class="section">
<h2 class="section-title"><span>3</span>Lodge Preference</h2>
<div class="form-group"><label>Nearest Lodge *</label><input type="text" id="nearestLodge" required></div>
</div>

<button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
</form>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSs3ekiR8vQ_1Ar5oZVBKGjuOQbwcgNEM",
  authDomain: "mansonry-family-fraternity.firebaseapp.com",
  databaseURL: "https://mansonry-family-fraternity-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mansonry-family-fraternity",
  storageBucket: "mansonry-family-fraternity.firebasestorage.app",
  messagingSenderId: "964415179161",
  appId: "1:964415179161:web:c8fd1a777542932d7c6b08"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);
let currentUser = null;
let isEditMode = false;
let existingStatus = "pending";

const form = document.getElementById("applicationForm");
const submitBtn = document.getElementById("submitBtn");
const countrySelect = document.getElementById("country");
const countryCodeSelect = document.getElementById("countryCode");
const toast = document.getElementById("toast");
const toastIcon = document.getElementById("toastIcon");
const toastMessage = document.getElementById("toastMessage");

const countryToCode = {"Kenya":"+254","Uganda":"+256","Tanzania":"+255","Rwanda":"+250","DRC":"+243","South Africa":"+27","Nigeria":"+234","Ghana":"+233","USA":"+1","UK":"+44"};

// AUTO SELECT CODE WHEN COUNTRY CHANGES
countrySelect.addEventListener("change", () => { 
  if(countryToCode[countrySelect.value]){ 
    countryCodeSelect.value = countryToCode[countrySelect.value]; 
  }
});

function showToast(type, message){
  toast.className = `toast ${type} show`;
  toastIcon.textContent = type === 'success'? '✓' : '✕';
  toastMessage.textContent = message;
  setTimeout(() => {toast.classList.remove('show');}, 3000);
}

function fillForm(data){
  document.getElementById('fullName').value = data.fullName || '';
  document.getElementById('dob').value = data.dob || '';
  document.getElementById('idNumber').value = data.idNumber || '';
  document.getElementById('gender').value = data.gender || '';
  document.getElementById('birthTown').value = data.birthTown || '';
  document.getElementById('nickname').value = data.nickname || '';
  document.getElementById('businessType').value = data.businessType || '';
  document.getElementById('businessLocation').value = data.businessLocation || '';
  document.getElementById('nearestLodge').value = data.nearestLodge || '';
  document.getElementById('country').value = data.country || '';
  document.getElementById('countryCode').value = data.countryCode || '';
  document.getElementById('phone').value = data.phoneNumber || '';
  existingStatus = data.status || "pending";
  isEditMode = true;
  submitBtn.textContent = "Update Application";
  form.classList.add('submitted');
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const snapshot = await get(ref(database, "applications/" + user.uid));
    if(snapshot.exists()){ fillForm(snapshot.val()); }
  } else {
    window.location.href = "login.html";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if(!currentUser) return showToast('error','Please login first');
  submitBtn.disabled = true;
  submitBtn.textContent = isEditMode? "Updating..." : "Submitting...";

  const country = document.getElementById('country').value;
  const countryCode = document.getElementById('countryCode').value;
  const phoneNumber = document.getElementById('phone').value.trim();
  
  const applicationData = {
    fullName: document.getElementById('fullName').value.trim(),
    dob: document.getElementById('dob').value,
    idNumber: document.getElementById('idNumber').value.trim(),
    gender: document.getElementById('gender').value,
    birthTown: document.getElementById('birthTown').value.trim(),
    nickname: document.getElementById('nickname').value.trim(),
    country, countryCode, phoneNumber, phone: countryCode + phoneNumber,
    businessType: document.getElementById('businessType').value.trim(),
    businessLocation: document.getElementById('businessLocation').value.trim(),
    nearestLodge: document.getElementById('nearestLodge').value.trim(),
    status: existingStatus, submittedBy: currentUser.uid, updatedAt: serverTimestamp()
  };

  try{
    await set(ref(database, "applications/" + currentUser.uid), applicationData);
    showToast('success', isEditMode? 'Application Updated!' : 'Application Submitted!');
    form.classList.add('submitted');
    setTimeout(() => {window.location.href = "help.html";}, 1500);
  } catch(error){
    console.error(error);
    showToast('error','Save Failed: ' + error.message);
    submitBtn.disabled = false;
    submitBtn.textContent = isEditMode? "Update Application" : "Submit Application";
  }
});

document.querySelector(".logout").addEventListener("click",(e)=>{
  e.preventDefault();
  signOut(auth).then(()=>{window.location.href="login.html";});
});
</script>
</body>
</html>
