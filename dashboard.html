<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemasonry Heritage | Member Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#d4af37;--dark:#050c18;}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:white;min-height:100vh;}
header{position:sticky;top:0;width:100%;padding:20px 8%;background:rgba(5,12,24,.85);display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:28px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.logout{background:var(--gold);color:#111;padding:11px 28px;border-radius:40px;text-decoration:none;font-weight:600;border:none;cursor:pointer;}
.dashboard{padding:60px 8%;}
.card{background:rgba(15,26,46,.7);padding:30px;border-radius:18px;border:1px solid rgba(212,175,55,.2);margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.toggle-icon{font-size:20px;color:var(--gold);transition:transform 0.3s;}
.card.collapsed.card-content{display:none;}
.card.collapsed.toggle-icon{transform:rotate(-90deg);}
.new-ann-alert{background:rgba(212,175,55,.2);border:1px solid var(--gold);color:var(--gold);padding:10px;border-radius:10px;margin-bottom:12px;display:none;}
.ann-item{background:rgba(5,12,24,.6); padding:12px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--gold);}
.ann-item h4{color:var(--gold);}
</style>
</head>
<body>
<header><div class="logo">FREEMASONRY HERITAGE</div><button class="logout" id="logoutBtn">Logout</button></header>
<main class="dashboard">
<h1 style="color:var(--gold);margin-bottom:20px;">Welcome <span id="greetingName">Member</span></h1>

<div class="card" id="announcementsCard">
  <div class="card-header" onclick="toggleAnnouncements()">
      <h3>📢 Latest Announcements</h3>
      <div class="toggle-icon">▼</div>
  </div>
  <div class="card-content">
      <div id="newAnnAlert" class="new-ann-alert">🔔 NEW ANNOUNCEMENT POSTED!</div>
      <div id="announcementsList">Loading...</div>
  </div>
</div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// YOUR CONFIG INJECTED
const firebaseConfig = {
apiKey: "AIzaSyBSs3ekiR8vQ_1Ar5oZVBKGjuOQbwcgNEM",
authDomain: "mansonry-family-fraternity.firebaseapp.com",
databaseURL: "https://mansonry-family-fraternity-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "mansonry-family-fraternity",
storageBucket: "mansonry-family-fraternity.firebasestorage.app",
messagingSenderId: "964415179161",
appId: "1:964415179161:web:c8fd1a777542932d7c6b08",
measurementId: "G-Q8LC74ZFXN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

onAuthStateChanged(auth, (user) => {
  if(!user){ window.location.href = "login.html"; return; }
  document.getElementById("greetingName").textContent = user.email.split('@')[0];
});

window.toggleAnnouncements = () => document.getElementById('announcementsCard').classList.toggle('collapsed');

let lastTimestamp = 0;
onValue(ref(database, 'announcements'), (snapshot) => {
  const data = snapshot.val();
  const list = document.getElementById('announcementsList');
  const newAlert = document.getElementById('newAnnAlert');
  const card = document.getElementById('announcementsCard');

  if(!data){ list.innerHTML = "No announcements yet"; return; }

  let arr = data.title? [data] : Object.values(data);
  arr.sort((a,b) => b.timestamp - a.timestamp);

  if(lastTimestamp!== 0 && arr[0].timestamp > lastTimestamp){
    newAlert.style.display = 'block';
    card.classList.remove('collapsed');
    setTimeout(() => newAlert.style.display = 'none', 8000);
  }
  lastTimestamp = arr[0].timestamp;

  list.innerHTML = arr.slice(0,5).map(a => `
    <div class="ann-item">
      <h4>${a.title}</h4>
      <p>${a.message}</p>
      <small>${new Date(a.timestamp).toLocaleString()}</small>
    </div>
  `).join('');
});

document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => location.href = "login.html");
</script>
</body>
</html>
