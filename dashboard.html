<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemasonry Heritage | Member Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#d4af37;--dark:#050c18;}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:white;min-height:100vh;}
header{position:sticky;top:0;width:100%;padding:20px 8%;background:rgba(5,12,24,.85);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(212,175,55,.2);}
.logo{font-size:28px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;}
.logout{background:var(--gold);color:#111;padding:11px 28px;border-radius:40px;text-decoration:none;font-weight:600;}
.dashboard{padding:60px 8%;max-width:1500px;margin:auto;}
.welcome h1{font-size:42px;color:var(--gold);font-family:'Cinzel',serif;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px;margin:30px 0;}
.stat-card{background:rgba(15,26,46,.6);border:1px solid rgba(212,175,55,.25);border-radius:18px;padding:30px;}
.stat-card h4{color:#a0b0c9;font-size:12px;}
.stat-card h2{color:var(--gold);font-size:36px;margin-top:12px;font-family:'Cinzel',serif;}
.main-grid{display:grid;grid-template-columns:1.3fr 0.7fr;gap:35px;}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr;}}
.profile-card{background:rgba(15,26,46,.7);border-radius:22px;padding:40px;border:1px solid rgba(212,175,55,.3);}
.profile-header{display:flex;gap:25px;align-items:center;margin-bottom:35px;}
.profile-image{width:100px;height:100px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:40px;color:#111;font-weight:700;}
.profile-info h2{font-size:28px;color:var(--gold);font-family:'Cinzel',serif;}
.details-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.detail{background:rgba(5,12,24,.6);padding:18px;border-radius:14px;border-left:4px solid var(--gold);}
.detail span{font-size:11px;color:#8a9bb0;}
.detail strong{font-size:15px;color:#fff;}
.side-cards{display:flex;flex-direction:column;gap:25px;}
.card{background:rgba(15,26,46,.7);padding:30px;border-radius:18px;border:1px solid rgba(212,175,55,.2);}
.card h3{color:var(--gold);margin-bottom:10px;font-family:'Cinzel',serif;}
.ann-item{background:rgba(5,12,24,.6); padding:14px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--gold);}
.ann-item h4{color:var(--gold); font-size:14px; margin-bottom:4px;}
.ann-item p{color:#ddd; font-size:13px;}
.ann-item small{color:#8a9bb0; font-size:11px;}
.card.admin-card{display:none;}
</style>
</head>
<body>
<header><div class="logo">FREEMASONRY HERITAGE</div><a href="#" class="logout">Logout</a></header>
<main class="dashboard">
<div class="welcome"><h1>Welcome Back, <span id="greetingName">Member</span></h1></div>
<section class="stats">
<div class="stat-card"><h4>Membership Status</h4><h2 id="statStatus">Pending</h2></div>
<div class="stat-card"><h4>Lodge</h4><h2 id="statLodge">Not Assigned</h2></div>
<div class="stat-card"><h4>Member Since</h4><h2 id="statSince">-</h2></div>
</section>
<div class="main-grid">
<section class="profile-card">
<div class="profile-header"><div class="profile-image" id="profileInitial">M</div><div class="profile-info"><h2 id="memberName">Loading...</h2><p id="memberEmail">-</p></div></div>
<div class="details-grid">
<div class="detail"><span>Full Name</span><strong id="detailFullName">-</strong></div>
<div class="detail"><span>Email Address</span><strong id="detailEmail">-</strong></div>
<div class="detail"><span>Phone Number</span><strong id="detailPhone">-</strong></div>
<div class="detail"><span>Country</span><strong id="detailCountry">-</strong></div>
</div>
</section>
<div class="side-cards">
  <div class="card"><h3>📢 Latest Announcements</h3><div id="announcementsList"><p>Loading...</p></div></div>
  <div class="card admin-card" id="adminPanel"><h3>⚙️ Admin Panel</h3><p><a href="admin.html" style="color:var(--gold);">Go to Dashboard →</a></p></div>
</div>
</div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBSs3ekiR8vQ_1Ar5oZVBKGjuOQbwcgNEM",
authDomain: "mansonry-family-fraternity.firebaseapp.com",
databaseURL: "https://mansonry-family-fraternity-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "mansonry-family-fraternity",
storageBucket: "mansonry-family-fraternity.firebasestorage.app",
messagingSenderId: "964415179161",
appId: "1:964415179161:web:c8fd1a777542932d7c6b08"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

onAuthStateChanged(auth, (user) => {
  if(!user){ window.location.href = "login.html"; return; }
  document.getElementById("memberEmail").textContent = user.email;
  document.getElementById("detailEmail").textContent = user.email;
  const userRef = ref(database, "users/" + user.uid);
  onValue(userRef, (snapshot) => {
    if(snapshot.exists()){
      const data = snapshot.val();
      const fullName = data.fullName || "Member";
      document.getElementById("greetingName").textContent = fullName.split(' ')[0];
      document.getElementById("memberName").textContent = fullName;
      document.getElementById("profileInitial").textContent = fullName.charAt(0).toUpperCase();
      document.getElementById("detailFullName").textContent = fullName;
      document.getElementById("detailPhone").textContent = data.phone || "Not Provided";
      document.getElementById("detailCountry").textContent = data.country || "Not Set";
      document.getElementById("statLodge").textContent = data.lodgeNumber || "Not Assigned";
      if(data.status === "approved" || data.status === "active"){
        document.getElementById("statStatus").textContent = "Active";
      }
      if(data.role === "admin"){ document.getElementById("adminPanel").style.display = "block"; }
    }
  });
});

// LOAD ANNOUNCEMENTS - WORKS WITH BOTH FORMATS
const announcementsRef = ref(database, 'announcements');
onValue(announcementsRef, (snapshot) => {
  const list = document.getElementById('announcementsList');
  const data = snapshot.val();
  if(!data){ list.innerHTML = `<p style="color:#a0b0c9;">No announcements yet</p>`; return; }

  let html = "";
  // If it has a title directly, it's the single object format you have now
  if(data.title){
    const date = data.timestamp? new Date(data.timestamp).toLocaleString() : 'Just now';
    html = `<div class="ann-item"><h4>${data.title}</h4><p>${data.message}</p><small>${date}</small></div>`;
  } else {
  // If it has keys, it's multiple announcements
    Object.keys(data).reverse().slice(0,5).forEach(key => {
      const a = data[key];
      const date = a.timestamp? new Date(a.timestamp).toLocaleString() : 'Just now';
      html += `<div class="ann-item"><h4>${a.title}</h4><p>${a.message}</p><small>${date}</small></div>`;
    });
  }
  list.innerHTML = html;
});

document.querySelector(".logout").addEventListener("click", (e) => {
  e.preventDefault(); signOut(auth).then(() => { window.location.href = "login.html"; });
});
</script>
</body>
</html>
