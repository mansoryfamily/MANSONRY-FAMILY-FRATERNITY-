<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemasonry | Member Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{--gold:#d4af37;--gold-light:#f1ca52;--dark:#07111f;}
body{background:var(--dark);color:white;min-height:100vh;}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(7,17,31,.88), rgba(7,17,31,.95)),url("photo-1682176162515-ee0589324751.jpeg");background-size:cover;background-position:center;background-attachment:fixed;z-index:-2;}
body::after{content:"◬";position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:400px;color:rgba(212,175,55,.03);z-index:-1;pointer-events:none;}
header{position:sticky;top:0;width:100%;padding:18px 8%;background:rgba(8,17,31,.7);backdrop-filter:blur(20px);display:flex;justify-content:space-between;align-items:center;z-index:1000;border-bottom:1px solid rgba(212,175,55,.15);}
.logo{font-size:26px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.logout{background:var(--gold);color:#111;padding:10px 24px;border-radius:30px;text-decoration:none;font-weight:600;transition:.3s;}
.logout:hover{background:var(--gold-light);transform:translateY(-2px);}
.dashboard{padding:50px 8% 120px;max-width:1400px;margin:auto;}
.welcome{margin-bottom:35px;}
.welcome h1{font-size:36px;color:var(--gold);font-weight:700;}
.welcome p{color:#aaa;margin-top:8px;font-size:15px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:35px;}
.stat-card{background:rgba(20,34,56,.6);backdrop-filter:blur(15px);border:1px solid rgba(212,175,55,.2);border-radius:16px;padding:25px;transition:.3s;}
.stat-card:hover{transform:translateY(-5px);border-color:var(--gold);}
.stat-card h4{color:#aaa;font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:1px;}
.stat-card h2{color:var(--gold);font-size:32px;margin-top:10px;}
.main-grid{display:grid;grid-template-columns:1.2fr 0.8fr;gap:30px;}
@media(max-width:1000px){.main-grid{grid-template-columns:1fr;}}
.profile-card{background:rgba(20,34,56,.7);backdrop-filter:blur(20px);border-radius:20px;padding:35px;border:1px solid rgba(212,175,55,.25);box-shadow:0 20px 50px rgba(0,0,0,.4);}
.profile-header{display:flex;gap:25px;align-items:center;margin-bottom:30px;}
.profile-image{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg, var(--gold), #b8941f);display:flex;align-items:center;justify-content:center;font-size:36px;color:#111;font-weight:700;border:3px solid rgba(212,175,55,.3);}
.profile-info h2{font-size:26px;color:var(--gold);margin-bottom:5px;}
.profile-info p{color:#aaa;font-size:14px;}
.details-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
.detail{background:rgba(8,17,31,.6);padding:16px 18px;border-radius:12px;border-left:3px solid var(--gold);}
.detail span{display:block;font-size:12px;color:#999;margin-bottom:4px;}
.detail strong{font-size:15px;color:#fff;}
.status-active{color:#4cff88;font-weight:700;}
.status-pending{color:#f1ca52;font-weight:700;}
.side-cards{display:flex;flex-direction:column;gap:20px;}
.card{background:rgba(20,34,56,.7);backdrop-filter:blur(20px);padding:25px;border-radius:16px;border:1px solid rgba(212,175,55,.15);transition:.3s;}
.card
